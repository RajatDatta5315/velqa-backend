name = "velqa-backend"
main = "server_v2.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]

[vars]
# Set these as secrets via: wrangler secret put SECRET_NAME
# Required: AI_API_KEY (Groq), SERPER_API_KEY
# For GitHub OAuth: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
# Create with: wrangler kv:namespace create velqa_kv
# Then replace the ID above

[triggers]
crons = ["0 */6 * * *"]
# Runs every 6 hours — scans all connected GitHub repos for GEO gaps
