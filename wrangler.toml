name = "velqa-backend"
main = "server_v2.py"
compatibility_date = "2024-01-01"
compatibility_flags = ["python_workers"]

[vars]
# Secrets set via: wrangler secret put SECRET_NAME

[[d1_databases]]
binding = "DB"
database_name = "velqa-db"
database_id = "REPLACE_WITH_VELQA_DB_ID"

[triggers]
crons = ["0 */6 * * *"]
